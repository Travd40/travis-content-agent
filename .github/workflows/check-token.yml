name: Check Meta Token

# Manual-only diagnostic. Inspects the META_PAGE_ACCESS_TOKEN secret
# in this repo and reports what scopes it has. Posts nothing.

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests python-dotenv
      - name: Inspect token
        env:
          META_GRAPH_VERSION:     ${{ secrets.META_GRAPH_VERSION }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_FB_PAGE_ID:        ${{ secrets.META_FB_PAGE_ID }}
          META_IG_USER_ID:        ${{ secrets.META_IG_USER_ID }}
          META_APP_ID:            ${{ secrets.META_APP_ID }}
          META_APP_SECRET:        ${{ secrets.META_APP_SECRET }}
        run: python tools/check_token.py
