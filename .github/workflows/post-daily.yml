name: Daily Coaching Post

on:
  schedule:
    # 9 AM Eastern = 13:00 UTC (during EST/winter) or 14:00 UTC (during EDT/summer).
    # Using 13:00 UTC year-round = 9 AM EST in winter, 9 AM EDT shifts to 9:00 ET in summer.
    # If you want it locked to 9 AM Eastern regardless of DST, pick one.
    - cron: '0 13 * * *'
  workflow_dispatch: {}  # lets you trigger from the GitHub UI any time

permissions:
  contents: write   # so the workflow can commit post_log.json updates back

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      - name: Install Remotion deps
        working-directory: remotion
        run: npm ci

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run agent
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          META_GRAPH_VERSION:       ${{ secrets.META_GRAPH_VERSION }}
          META_PAGE_ACCESS_TOKEN:   ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_FB_PAGE_ID:          ${{ secrets.META_FB_PAGE_ID }}
          META_IG_USER_ID:          ${{ secrets.META_IG_USER_ID }}
          META_APP_ID:              ${{ secrets.META_APP_ID }}
          META_APP_SECRET:          ${{ secrets.META_APP_SECRET }}
          # GitHub Actions reserves the name GITHUB_TOKEN, so the secret is stored
          # as CONTENT_VIDEOS_TOKEN in GitHub but exposed to the agent as GITHUB_TOKEN:
          GITHUB_TOKEN:             ${{ secrets.CONTENT_VIDEOS_TOKEN }}
          GITHUB_USERNAME:          ${{ secrets.GH_USERNAME }}
          COACHING_WEBSITE:         ${{ secrets.COACHING_WEBSITE }}
          COACHING_NAME:            ${{ secrets.COACHING_NAME }}
          BOOK_LINK:                ${{ secrets.BOOK_LINK }}
          CALENDLY_LINK:            ${{ secrets.CALENDLY_LINK }}
          # ElevenLabs voiceover (optional — silent video if unset)
          ELEVENLABS_API_KEY:       ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID:      ${{ secrets.ELEVENLABS_VOICE_ID }}
          # YouTube upload (same secret values as travis_coaching_site).
          # If these are unset the agent just skips the YouTube step.
          YOUTUBE_CLIENT_ID:        ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:    ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:    ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PLAYLIST_ID:      ${{ secrets.YOUTUBE_PLAYLIST_ID }}
        run: python agent.py --now

      - name: Persist post_log.json back to repo
        if: always()  # commit even if upstream steps had warnings, so dedup memory updates
        run: |
          if [ -n "$(git status --porcelain post_log.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add post_log.json
            git commit -m "Update post log [skip ci]"
            git push
          else
            echo "post_log.json unchanged — nothing to commit"
          fi

      - name: Upload last-failure log as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs
          path: |
            LAST_FAILURE.txt
            failures.log
            scheduler.log
          if-no-files-found: ignore
          retention-days: 30
